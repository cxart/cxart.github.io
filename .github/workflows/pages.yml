name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Add private Amanda simulator
        env:
          AMANDA_SIMULATOR_HTML_B64: ${{ secrets.AMANDA_SIMULATOR_HTML_B64 }}
        run: |
          test -n "$AMANDA_SIMULATOR_HTML_B64"
          mkdir -p amanda-simulator
          printf '%s' "$AMANDA_SIMULATOR_HTML_B64" | base64 --decode > amanda-simulator/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
