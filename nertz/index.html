<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Nertz</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='white'/%3E%3Ctext x='50' y='74' text-anchor='middle' font-size='62' font-family='Arial' fill='%23111827'%3E%E2%99%A0%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Sora:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" id="nertz-stylesheet" />
    <script>
      (() => {
        const bust = String(Date.now());
        window.__NERTZ_ASSET_BUST = bust;
        const styleEl = document.getElementById("nertz-stylesheet");
        if (styleEl) {
          styleEl.href = `styles.css?v=${encodeURIComponent(bust)}`;
        }
      })();
    </script>
  </head>
  <body data-back-style="crimson">
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="hero" id="hero">
        <div class="hero-title">
          <h1>Nertz</h1>
        </div>
        <div class="hero-links">
          <a class="home-link" href="../index.html">Back to Home</a>
        </div>
      </header>

      <section class="setup-card" id="setup-card">
        <div class="setup-grid">
          <label class="setup-inline">
            <span class="setup-inline-label">Players</span>
            <select id="player-count">
              <option value="2">2 Players</option>
              <option value="3" selected>3 Players</option>
              <option value="4">4 Players</option>
            </select>
          </label>

          <label class="setup-inline">
            <span class="setup-inline-label">Bot Difficulty</span>
            <select id="difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </label>

          <label class="setup-inline">
            <span class="setup-inline-label">Setup</span>
            <select id="setup-pattern">
              <option value="1-2-3-4" selected>1-2-3-4</option>
              <option value="2-2-2-2">2-2-2-2</option>
              <option value="1-1-1-1">1-1-1-1</option>
            </select>
          </label>

          <div class="setup-back-row setup-inline">
            <span class="setup-inline-label setup-back-label">Card Back</span>
            <div class="setup-back-controls">
              <div id="back-preview-mini" class="back-preview-mini"></div>
              <a href="card-back.html" class="btn-secondary btn-cardback">Customize</a>
            </div>
          </div>
        </div>

        <div class="setup-handicap-panel" id="setup-handicap-panel"></div>

        <div class="setup-actions">
          <button id="start-btn" class="btn-primary">Start Match</button>
        </div>
      </section>

      <section class="status-card hidden" id="status-card">
        <div>
          <h2 id="status-title">Ready to play</h2>
          <p id="status-text">Pick settings, then start a match.</p>
        </div>
        <div id="selected-pill" class="selected-pill hidden"></div>
      </section>

      <section class="table-view hidden" id="table-view">
        <div class="bot-row" id="bot-row"></div>

        <div class="center-panel">
          <div class="center-piles" id="center-piles"></div>
        </div>

        <div class="ready-overlay hidden" id="ready-overlay" role="button" tabindex="0" aria-label="Click to indicate ready">
          <div class="ready-panel">
            <div class="ready-message">click to indicate ready</div>
            <div class="ready-list" id="ready-list"></div>
          </div>
        </div>

        <div class="human-panel">
          <div class="metrics hidden">
            <span id="metric-center">Center: 0</span>
            <span id="metric-nertz">Nertz Left: 13</span>
          </div>

          <div class="human-top hidden">
            <div class="spot-block hidden" id="nertz-spot"></div>
            <div class="spot-block" id="draw-spot"></div>
          </div>

          <div class="play-strip" id="tableau"></div>
        </div>
      </section>

      <section class="log-card hidden" id="log-card">
        <div class="panel-topline">
          <h3>Action Log</h3>
          <button class="btn-inline" id="clear-selection-btn">Clear Selection</button>
        </div>
        <ul id="action-log"></ul>
      </section>
    </main>

    <button id="force-reshuffle-btn" class="btn-secondary" type="button">
      Rotate Draw Piles
    </button>

    <div class="modal hidden" id="end-modal" aria-live="polite">
      <div class="modal-card">
        <h2 id="end-title">Round Complete</h2>
        <p id="end-subtitle"></p>
        <div id="scoreboard"></div>
        <div class="modal-actions">
          <button id="play-again-btn" class="btn-primary hidden" type="button">Play Again</button>
          <button id="return-lobby-btn" class="btn-secondary hidden" type="button">Return to Lobby</button>
          <button id="close-modal-btn" class="btn-primary" type="button">Close</button>
        </div>
      </div>
    </div>

    <script>
      (() => {
        const bust = window.__NERTZ_ASSET_BUST || String(Date.now());
        const script = document.createElement("script");
        script.src = `game.js?v=${encodeURIComponent(bust)}`;
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
