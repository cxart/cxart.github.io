<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Card Back — Nertz</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='white'/%3E%3Ctext x='18' y='35' font-size='30' font-family='Arial' font-weight='700'%3EA%3C/text%3E%3Ctext x='30' y='82' font-size='56' font-family='Arial'%3E%E2%99%A0%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Sora:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" id="nertz-stylesheet" />
    <script>
      (() => {
        const bust = String(Date.now());
        window.__NERTZ_ASSET_BUST = bust;
        const styleEl = document.getElementById("nertz-stylesheet");
        if (styleEl) {
          styleEl.href = `styles.css?v=${encodeURIComponent(bust)}`;
        }
      })();
    </script>
    <style>
      .designer-shell {
        max-width: 720px;
        margin: 0 auto;
        display: grid;
        gap: 16px;
        position: relative;
        z-index: 1;
      }

      .designer-section {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(7px);
        padding: 18px 20px;
      }

      .designer-section h2 {
        margin: 0 0 14px;
        font-family: "DM Serif Display", Georgia, serif;
        font-size: 1.18rem;
        font-weight: 400;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.78rem;
      }

      /* Pattern swatches */
      .pattern-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 10px;
      }

      .pattern-swatch {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }

      .swatch-card {
        width: 60px;
        height: 85px;
        border-radius: 9px;
        border: 2px solid transparent;
        position: relative;
        overflow: hidden;
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
        transition: transform 0.15s, border-color 0.15s;
        flex-shrink: 0;
        background: var(--swatch-ring, #7a1621);
      }

      .swatch-card::before {
        content: "";
        position: absolute;
        inset: 4px;
        border-radius: 6px;
        background-color: var(--swatch-inner, #7a1621);
        background-image: var(--swatch-pattern);
        background-size: var(--swatch-size, auto);
        background-position: center;
      }

      .swatch-card::after {
        content: "";
        position: absolute;
        inset: 4px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.4);
      }

      .pattern-swatch:hover .swatch-card {
        transform: translateY(-3px);
      }

      .pattern-swatch.selected .swatch-card {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(242, 184, 77, 0.5), 0 8px 18px rgba(0, 0, 0, 0.35);
      }

      .swatch-label {
        font-size: 0.72rem;
        color: var(--muted);
        text-align: center;
      }

      .pattern-swatch.selected .swatch-label {
        color: var(--accent);
      }

      /* Color palettes */
      .palette-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
      }

      .palette-group:last-child {
        margin-bottom: 0;
      }

      .palette-label {
        font-size: 0.78rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        text-align: center;
      }

      .palette-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }

      .color-swatch {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 2px solid transparent;
        cursor: pointer;
        position: relative;
        transition: transform 0.12s, border-color 0.12s;
        flex-shrink: 0;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.35);
      }

      .color-swatch:hover {
        transform: scale(1.12);
      }

      .color-swatch.selected {
        border-color: #fff;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.5), 0 3px 10px rgba(0, 0, 0, 0.4);
        transform: scale(1.08);
      }

      .color-swatch.selected::after {
        content: "✓";
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.9);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      }

      /* Preview */
      .preview-area {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .preview-card-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .preview-label {
        font-size: 0.75rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      #preview-card {
        width: 100px;
        height: 142px;
        border-radius: 13px;
        border: 1px solid rgba(8, 10, 12, 0.75);
        position: relative;
        overflow: hidden;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.4);
        background: var(--preview-bg, #b03040);
      }

      #preview-card::before {
        content: "";
        position: absolute;
        inset: 6px;
        border-radius: 9px;
        background-color: var(--preview-inner, #6e1520);
        background-image: var(--preview-pattern);
        background-size: var(--preview-size, auto);
        background-position: center;
      }

      #preview-card::after {
        content: "";
        position: absolute;
        inset: 6px;
        border-radius: 9px;
        border: 1px solid rgba(255, 255, 255, 0.45);
      }

      /* Save actions */
      .save-row {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .save-row .btn-primary {
        padding: 10px 20px;
        font-size: 0.9rem;
      }

      .save-hint {
        font-size: 0.78rem;
        color: #b8a888;
      }

      @media (max-width: 560px) {
        .pattern-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>

    <main class="designer-shell">
      <header class="hero" style="align-items:center">
        <h1 style="margin:0;margin-right:24px">Card Back</h1>
        <a class="btn-primary" href="index.html" style="text-decoration:none;white-space:nowrap;padding:10px 18px;font-size:0.88rem;border-radius:10px">← Back to Game</a>
      </header>

      <section class="designer-section">
        <h2>Pattern</h2>
        <div class="pattern-grid" id="pattern-grid"></div>
      </section>

      <section class="designer-section">
        <h2>Colors</h2>
        <div class="palette-group">
          <span class="palette-label">Primary color</span>
          <div class="palette-grid" id="primary-palette"></div>
        </div>
        <div class="palette-group">
          <span class="palette-label">Secondary color</span>
          <div class="palette-grid" id="secondary-palette"></div>
        </div>
      </section>

      <section class="designer-section">
        <h2>Preview</h2>
        <div class="preview-area">
          <div class="preview-card-wrap">
            <div id="preview-card"></div>
            <span class="preview-label">Card Back</span>
          </div>
        </div>
      </section>

    </main>

    <script>
      (() => {
        const bust = window.__NERTZ_ASSET_BUST || String(Date.now());
        const script = document.createElement("script");
        script.src = `card-back.js?v=${encodeURIComponent(bust)}`;
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
